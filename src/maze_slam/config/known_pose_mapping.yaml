known_pose_mapper:
  ros__parameters:
    use_sim_time: true

    scan_topic: /scan
    odom_topic: /calc_odom
    map_topic: /map
    path_topic: /known_pose_path
    map_frame: map

    resolution: 0.05
    width_m: 12.0
    height_m: 12.0
    origin_x: -6.0
    origin_y: -6.0

    occupied_probability: 0.70
    free_probability: 0.40
    occupied_threshold: 0.65
    free_threshold: 0.35
    min_log_odds: -5.0
    max_log_odds: 5.0

    ray_stride: 1
    max_range: 8.0
    hit_range_margin: 0.02
    publish_hz: 2.0
    odom_timeout_sec: 0.5
    max_path_poses: 2500
